<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Fashion Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Interactive Fashion Quiz</h1>
    <p class="intro">Test your knowledge about fashion trends, designers, fabrics, and styling. Select the correct answer and click Next to continue.</p>

    <div id="quiz-box">
        <h2 id="question">Question Text</h2>
        <div id="options"></div>
        <button id="next-btn">Next</button>
    </div>

    <div id="result-box" class="hidden">
        <h2 id="score"></h2>
        <p id="message"></p>
        <button id="restart-btn">Restart Quiz</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
