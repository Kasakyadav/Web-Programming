</head>

<body>

<div class="app">

```
<h1>🌦 Weather Dashboard</h1>

<!-- Search Section -->
<div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>
    <button onclick="getLocationWeather()">My Location</button>
</div>

<!-- Loading Animation -->
<div class="loader" id="loader">Loading...</div>

<!-- Current Weather Card -->
<div class="weather-card" id="weatherCard">

    <h2 id="cityName">City Name</h2>

    <img id="weatherIcon" src="" alt="Weather Icon">

    <p id="temp">Temperature: -- °C</p>
    <p id="desc">Condition: --</p>
    <p id="humidity">Humidity: --%</p>
    <p id="wind">Wind Speed: -- km/h</p>

</div>

<!-- Forecast Section -->
<h2 class="forecast-title">5 Day Forecast</h2>

<div class="forecast" id="forecast">
    <!-- Forecast cards will appear here from JavaScript -->
</div>
```

</div>

<!-- JavaScript File -->

<script src="script.js"></script>

</body>
</html>
