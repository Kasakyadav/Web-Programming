<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="unique.css">
</head>
<body>

    <div class="container">
        <h1>📝 My Dynamic To-Do List</h1>
        <p class="description">
            Manage your daily tasks efficiently. Add, edit, delete, and mark tasks as completed.
        </p>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter your task here...">
            <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="task-counter">
            <span id="totalTasks">Total: 0</span> |
            <span id="completedTasks">Completed: 0</span> |
            <span id="pendingTasks">Pending: 0</span>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
